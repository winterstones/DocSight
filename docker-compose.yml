services:
  # ─────────────────────────────────────────
  # LOOM — Infrastructure (don't modify)
  # ─────────────────────────────────────────
  loom-api:
    image: registry.gitlab.com/swiss-armed-forces/cyber-command/cea/loom/api:latest
    environment:
      - ES_HOST=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
      - REDIS_CACHE_HOST=redis://redis:6379
      - CELERY_BROKER_HOST=redis://redis:6379/1
      - CELERY_BACKEND_HOST=redis://redis:6379/0
      - FILE_STORAGE__HOST=minio:9000
      - FILE_STORAGE__BUCKET_NAME=loom-filestorage
      - FILE_STORAGE__ACCESS_KEY=minioadmin
      - FILE_STORAGE__SECRET_KEY=minioadmin
      - LAZYBYTES_STORAGE__HOST=minio:9000
      - LAZYBYTES_STORAGE__BUCKET_NAME=loom-lazybytes
      - LAZYBYTES_STORAGE__ACCESS_KEY=minioadmin
      - LAZYBYTES_STORAGE__SECRET_KEY=minioadmin
      - INTAKE_STORAGE__HOST=minio:9000
      - INTAKE_STORAGE__BUCKET_NAME=loom-intake
      - INTAKE_STORAGE__ACCESS_KEY=minioadmin
      - INTAKE_STORAGE__SECRET_KEY=minioadmin
    depends_on:
      - elasticsearch
      - redis
      - minio
    ports:
      - "8001:8084"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  # ─────────────────────────────────────────
  # DOCSIGHT — Your application
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docsight}
      POSTGRES_USER: ${POSTGRES_USER:-docsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docsight}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsight}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-docsight}:${POSTGRES_PASSWORD:-docsight}@postgres:5432/${POSTGRES_DB:-docsight}
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - LOOM_API_URL=http://loom-api:8084
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ALLOWED_HOSTS=localhost,backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgres://${POSTGRES_USER:-docsight}:${POSTGRES_PASSWORD:-docsight}@postgres:5432/${POSTGRES_DB:-docsight}
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - LOOM_API_URL=http://loom-api:8084
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
