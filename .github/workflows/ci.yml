name: CI — DocSight

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: docsight_test
          POSTGRES_USER: docsight
          POSTGRES_PASSWORD: docsight
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/development.txt
        working-directory: backend

      - name: Run pytest + coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DATABASE_URL: postgres://docsight:docsight@localhost:5432/docsight_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key
          USE_MOCK_ENGINE: "True"
        run: |
          pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=70
        working-directory: backend

  # ─── Frontend Tests ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (vitest + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Run vitest
        run: npm test -- --run
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t docsight-backend ./backend

      - name: Build frontend image
        run: docker build --target production -t docsight-frontend ./frontend
